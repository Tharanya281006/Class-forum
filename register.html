<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Campus Connect</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="page-bg" data-page="register">
    <div class="auth-top-actions">
      <div class="theme-toggle-wrap">
        <span>Theme</span>
        <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
          <span class="knob"></span>
        </button>
      </div>
    </div>

    <main class="auth-shell">
      <section class="auth-card">
        <h1>Create Account</h1>
        <p>Create your Campus Connect profile to discover people, follow public discussions, and join classes.</p>

        <form data-auth-form="register" novalidate>
          <div class="form-group">
            <input class="floating-input" type="text" id="registerName" name="name" placeholder=" " required />
            <label class="floating-label" for="registerName">Full Name</label>
          </div>

          <div class="form-group">
            <input class="floating-input" type="email" id="registerEmail" placeholder=" " required />
            <label class="floating-label" for="registerEmail">Email Address</label>
          </div>

          <div class="form-group">
            <input class="floating-input" type="password" id="registerPassword" placeholder=" " required />
            <label class="floating-label" for="registerPassword">Password</label>
          </div>

          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>

        <div class="auth-footer">
          Already have an account?
          <a class="inline-link" href="login.html">Sign in</a>
        </div>
      </section>
    </main>

    <div class="toast-host"></div>
    <script src="assets/js/script.js"></script>
  </body>
</html>
