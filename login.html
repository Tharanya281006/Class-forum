<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Campus Connect</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="page-bg" data-page="login">
    <div class="auth-top-actions">
      <div class="theme-toggle-wrap">
        <span>Theme</span>
        <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
          <span class="knob"></span>
        </button>
      </div>
    </div>

    <main class="auth-shell">
      <section class="auth-card">
        <h1>Welcome Back</h1>
        <p>Sign in to Campus Connect and explore public campus updates plus private class communities.</p>

        <form data-auth-form="login" novalidate>
          <div class="form-group">
            <input class="floating-input" type="email" id="loginEmail" placeholder=" " required />
            <label class="floating-label" for="loginEmail">Email Address</label>
          </div>

          <div class="form-group">
            <input class="floating-input" type="password" id="loginPassword" placeholder=" " required />
            <label class="floating-label" for="loginPassword">Password</label>
          </div>

          <button type="submit" class="btn btn-primary">Login to Campus Connect</button>
        </form>

        <div class="auth-footer">
          New here?
          <a class="inline-link" href="register.html">Create your account</a>
        </div>
      </section>
    </main>

    <div class="toast-host"></div>
    <script src="assets/js/script.js"></script>
  </body>
</html>
